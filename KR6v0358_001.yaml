body:
  text: 西藏迦居爾宗二十四祖珀瑪迦爾波喇嘛原著西藏達瓦桑杜格西喇嘛英文譯傳從學弟子美國伊文思溫慈博士纂集震旦觀化廬學藏密菩薩優婆塞張妙定蓮菩提金剛正重譯漢文皈敬皈敬尊聖光榮諸寶上師足下引端今於此中開演訓導微妙心要使自本具之俱生正智得以無比光顯須依調攝煆煉具足金剛勝報身者之身心靈命乃能出生此心要有兩部一謂精勤修習於啓請祈禱歷代宗承此無上心要法門諸寶上師求垂加被之前導作持此中不述二即精勤修習於諸寶上師所宗承之密要法門此復分二一為如咒道次第共學之教示二為諸己成就相上師感應道交由本尊示現親得宗承口耳授受不共教學之極祕要妙今所開演即此極祕要妙之大綱共有六者成就法門一靈熱成就二幻觀成就三夢觀成就四淨光成就五中陰成就六轉識成就第一章靈熱成就法靈熱成就分三步修習一前行修習二根本修習三實驗修習第一節前行修習前行修習又分五段一觀外粗身空二觀內細身空三觀身擁護輪四靈息之訓練五靈力之加持第一段觀外粗身空觀外粗身空者已作皈依發心修合上師等即觀自身剎那變作金剛佛母梵名嚩資囉瑜祇尼藏名多傑勒卓瑪全身紅色放射如紅寶石之光明一頭三目兩臂右手擎舉雪亮晃耀之金剛灣刀揚舞頭上所有一切幻想妄念能齊根斷絶左手曲臂平胸持人腦蓋碗內滿貯紅白物以表甘露現充分滿足無量安樂相戴五骷髏之額箍五十鮮血人頭之項圈等共具足如常六種莊嚴之五種惟除身塗燒尸灰之一種此云五莊嚴者除所述之額箍項圈兩者外其他三者即臂釧並腕釧為第三踝釧為第四護業心鏡為第五此護業心鏡用人筋繫於身前當胸處此六種莊嚴品總表六波羅密多左臂灣夾一白色長杖此表金剛佛父之聖體佛母裸體曼妙如十六少女作蹈舞姿勢右小腿向左上踡足心上仰左足直立踏壓於一偃伏之人尸上表了生死之意智火光焰通身圍繞於中安住行者即如是觀想自身外表一如上述佛母之形色內體則觀作如一紅色空囊通明透亮乃至手指足趾之甲尖亦無不中空內無一物正同用極薄紅絹所鼓張之帳篷或吹氣鼓張一極薄皮膜之氣球內外紅色通明初則觀其體積之大與自體身量相等繼漸增大之如房如舍如山終乃大至所有整個宇宙之大皆為所囊括而無餘如是專一心念住此觀若干之時次則觀想體漸縮小竟小至於一芝麻乃至尤較細於一極小芝麻之微然其體量雖小身色肢分內外一切仍必一一了了分明如是專一心念住此觀又若干之時第二段觀內細身空觀內細身空者謂靈識脈道觀其法先觀自身變成金剛瑜祇尼佛母體如常人之量其內有備具如下四相之靈識中脈道下抵密處上抵梵穴四相者謂紅如渥丹之色明如酥油之燈直如芭蕉之幹空如紙捲之筒脈管之大不過箭桿觀其漸大如棍如柱如舍如山乃至全宇宙之萬相皆可包羅之同時自體亦觀其漸漸大至無外舉體全空惟此中樞靈識脉道即手指足趾之甲尖亦具為之充滿貫達旋復觀其如上法漸漸收小至較極小芝麻而尤細乃至觀此脉管小至有若一毫毛百分之一尚不能比之微此如教所云觀身內空細細至不能描觀身內空細細至不能見觀身內空細細至不能住第三段觀身擁護輪觀身擁護輪者復分三曰正身正息正意是也初正身者即著坐安身此詳見第二節第一段中之法次正息者將體中陳息呼出盡已引入深長吸息極令滿足乃提舉膈膜將息逼緊於胸腔中勿令下泄如水壺不漏於是保持其息至盡力能持之久此於下文更有詳述後正意者即作意觀息法呼息出時觀想無數無量之五色光芒由一一毛孔向外放射充滿空中吸息入時觀想無數無量之五色光芒由一一毛孔吸入自體充滿體中此隨息觀五色光芒一一毛孔出入於體各行七遍已繼則觀五色光芒變成吽字具備五色吽字所具五色即表五佛之五智體可參看吽字瑜珈法亦如上由一一毛孔隨息出入於體此亦作七遍復次觀想此具備五色之吽字一一變成無數無量五種身色之忿怒金剛各各一面二手右手舞五鈷金剛棒左手當胸作降伏手印兩足右踡左伸而立現極忿怒可畏之相然其體分之小不過極細芝麻觀其隨出入息由一一毛孔出入於體此亦各作七遍最後乃觀身之一一毛孔各皆塞駐有此無數無量之五種身色小體金剛面朝於外立於毛孔猶之駐守護衛門戶者然謂之金剛甲胄即成就行者之身擁護輪矣第四段靈息之訓練靈息之訓練者於中樞靈脈道之兩側觀有兩傍脈道上自左右兩鼻孔通入上行入腦繞頂及後腦分循中脈兩側下行均抵近密處以與中脈會合此左右兩傍脈亦各中空於其左傍脈管之空腔中觀有依序鋪叠之十六母音藏文字母之字珠於右脈道中觀有三十四父音字母觀各字筆畫細於藕絲俱作紅色依次平鋪叠成一串連續隨息出入惟出由鼻孔入由密處如是一心專注觀此左右兩道真言字珠串循環交替出入於體同時左右替換呼吸其息以相應之此猶先治溝渠而後乃使水流無礙是為以真言字母加持左右靈脈道之要妙修習第五段靈力之加持靈力之加持者於中央靈脈道中部即當心之處觀想自之傳法上師作瑜伽者之坐式於其頭頂順序逆溯而上各於頭頂坐有此明行道六成就法之歷代宗傳上師叠成一串如小珠一直行其最上端為金剛大持藏名多傑羌佛尊其最下端為行者之親教傳法上師於是至誠恭敬誦如下之祈禱加持頌願求諸上師賜豫大加持使彼四種力悉具我心中願求諸上師賜豫大加持一切現見者成大曼荼羅願求諸上師賜豫大加持神妙靈息力入我中脈道願求諸上師賜豫大加持使神妙靈熱得以熾然生願求諸上師賜豫大加持不淨幻化身使得速轉變願求諸上師賜豫大加持清淨幻化身使得即現前願求諸上師賜豫大加持夢幻諸顛倒使得速消滅願求諸上師賜豫大加持認證清淨光不外我心體願求諸上師賜豫大加持清淨聖樂土由轉識而入願求諸上師賜豫大加持正覺菩提道此一生成就願求諸上師賜豫大加持無餘涅槃道使我速證得或用如下簡略文曰願求上師賜加持諸法入體成靈熱願求上師賜加持諸法了達皆如幻願求上師賜加持諸法於我成淨光願求上師賜加持諸法皆成淨三身願求上師賜加持使我地地轉上勝願求上師賜加持使我速成無上道如前禱已觀諸上師一一融化入於傳法上師一人之身而此諸聖融合之一身又即轉成至極圓妙無上安樂之淨智光明攝入充滿自己身中與己合體無二第二節根本修習根本修習者分三一靈熱之發生二靈熱之經驗三靈熱之超勝第一段靈熱之發生靈熱之發生又分四一著坐安身二輕調風息三重調風息四靈熱觀想初著坐安身者訣云端身如佛之坐即跏趺坐梵云珀瑪桑那直豎脊梁如直垜銅錢一串伸放膈膜令極寬鬆低首前俯令地角抵壓食管上端之喉結舌抵上腭兩手於臍以下各以掌上曲灣腕令兩腕外灣處分置兩跨灣際視線取一適可之角度即注視之不得高低欹斜改動且必制伏思潮令心識惟與呼吸維繫相應其所以作跏趺坐者為令行者不久趣入菩提道然亦可方便作瑜伽坐式梵云悉達桑那此式較舒適法以左足跟灣入抵近密處而以右足加左足之上右足跟亦灣向內且令掌上仰靠近臍下傳如下訣云著如佛之坐式須跏趺右加左兩手上仰叠掌亦右加左而平持於臍下作彌陀印式或仰掌曲腕以腕背分置兩大腿跨灣處藉以支身直豎脊椎如直叠銅錢張放臍膜安適為度地角抵喉結舌抵上腭注視鼻尖或向前平視如不能跏趺可方便著悉達桑那之瑜伽坐式即如上所述者行者須備一禪坐之帶圈四倍頭箍許大用以上套於頸下兜膝外灣際令入定後不致傾仆此帶圈謂之禪定帶圈又須備一方墊一尺七八寸見方厚約四指內實柔物此名禪定墊二輕調風息者分二即三三九之風箱式及呼吸四種合法是也三三九之風箱式者先用右鼻孔三呼吸吸時頭須隨之由右轉向左次用左鼻孔三呼吸吸時頭須隨之由左轉向右末次頭不動兩鼻孔同用亦三呼吸此三三呼吸共三作即共作三九二十七呼吸也第一遍之九息極輕細幾不自聞其聲第二遍之九息略可聞聲第三遍之九息不惟可聞呼吸之聲且吸時須扭動身體使息得充分滿達肺部故此亦名為扭息次呼吸四種合法者如訣云曲頸向前灣令如鐵鈎式鼓張胸腔部令如瓦水壺將息緊拴繫令如灣弓弦射息而呼出令如放箭式又訣云引息滿息與均息及以射息為四法不明四法合作者無益有損險當知釋曰言引息者於身前約十六指之距離處想有靈息輪圈用兩鼻孔輕緩無聲飽滿引吸入體中之謂也引息入已務須極盡充滿達到肺之最下端於是收束腹筋令隔膜上提以抵逼胸腔同時閉氣下壓使此上下不漏中滿風息之胸腔如同瓦壺滿滿盛水而不滲漏點滴是即滿息或云壺式息既作此壺式已當更力挺胸骨以提隔膜令其膜之中凸者愈再上抵胸腔同時膜之兩旁愈向下收窄彈力亦愈大所謂如抽弦彎弓之式但此時也胸腔縱已被逼於其下端之高凸膈膜然猶一面緊之再緊扭動胸肋各骨愈益挺出胸腔一面更由鼻孔吸入短息數口使胸中風息極盡緊滿無以復加而各處無不極盡均勻達到是之謂均息息既滿而且均於是保持勿泄至儘力能持之久然後乃由兩鼻孔先輕微和緩繼略粗重終乃一衝而出如射箭是之謂射息此四法須合作打成一片所謂引滿均射一氣依次行之方為完整之瑜伽息否則無益而反有害也三重調氣息者與上諸法大率相同惟作時加重氣力而為之此有五意義謂用力以作風箱式之三三九息所以防息之破斷一也用力滿引吸息令能充分達入各應到之處二也肺量務令極盡擴張俾能充分納入風息則靈息入體多而靈熱易發生三也用力保持風息極令滿足俾靈脈穴道得充分攝入風息中之靈力活素四也弛息時亦用力為之使體外及體內之靈力活素震蕩加劇則混合交融及引攝力亦大五也四靈熱觀想者此復分三一外靈熱二內靈熱三祕密靈熱初外靈熱者訣云剎那變成金剛母專注觀彼幻變身換言之即專注觀想於上所述剎那所變體量同己身之金剛瑜祇尼母等等表法了了分明則外之靈熱加持具足矣二內靈熱者訣云專注觀想於四輪猶如車輪或傘蓋釋之曰謂行者所觀習於上述之皮囊空體其中脈穴道亦中空者乃表法爾一大實相之如實空也其紅色者表大安樂也其透明者以其妙明無染能豁破無明重障也其體直者表生本之樹幹也中脈為一切靈脈之大本營在此脈道中近命門處有為生命本原識種初植之穆拉達囉基本靈火輪中脈由此而發生五官百骸亦由之長養而成故此中脈即吾人身心靈命樹之總幹瑜珈行人由此修習得解脫之果行人須觀想具此四德之中樞靈識脈道上達梵穴即頂門下達臍下四指之處即命門有穆拉達囉輪又觀此中脈上下端皆平頭靠近中脈兩傍有以達納底之左脈道及丙嘎拉納底之右脈道如瘦小羊腸之大上行繞腦巔由前腦下折通入兩鼻孔下端與中脈道會合之前各挽一圈如藏文之字形又三脈道並通於腦巔之處謂之灑哈沙囉頂洽格囉輪亦名千葉蓮臺此處有依止中脈為軸之三十二支脈道向下俯張於喉際有微素達洽格囉之喉輪亦有依中脈為軸之十六支脈道向上仰張於心際有阿那哈達洽格囉之心輪有八支脈向下俯張於臍際有嘛尼補囉洽格囉之臍輪有六十四支脈向上仰張凡諸輪處之各小支脈觀其如傘蓋之骨或如輪盤之輻依中央之中脈為柄為軸及其傍脈為聯貫而繫聚者行人須依是觀想了了分明三祕密靈熱者訣云阿字半體為觀點發生靈熱祕密法於臍下四指左右脈與中脈會合處觀想半阿字細如毫毛長僅半指色粽紅飄動發如風吹繩索之蹦蹦聲有熱觸又於頂輪千葉蓮臺處之中脈內觀想涵字白色如欲降滴甘露之狀於是引入風息而攝靈力入於左右脈道中此靈力下行膨脹由中脈底端鼓入上觸細如毫毛之半阿字令其不惟加粗且熾然轉為鮮明之紅色此之觀想須與均息之法相應而作當呼息出時雖實際由鼻孔出息然同時須觀中脈道中𢌞出有藍色靈力流與息俱出又於保持住息時觀想由紅色半阿字體發生火焰半指長上端尖鋭熾然上澆此火焰同賦有如中脈道之四德即直明紅空且此火焰速速轉動如紡椎之不停又每一吸息入體後此火焰即上升半指經入息後即升至臍輪處又經十息則凡由臍輪中脈分出之各各支脈道中皆充滿靈熱又經十息此靈熱焰下轉令下體各部無不充滿靈熱即足趾尖端亦皆貫到又經十息靈焰復上熾達於心輪處又經十息達喉輪又經十息達頂輪如是遞上遂至於如訣所云漸得神牛降聖乳之妙境此譯神牛藏文為朗喀巴乃上述涵字之密稱蓋半阿陰字之性表陰而此涵字之性表陽聖陽得合於聖陰如甘露之聖乳降澍矣此訣言極深祕意即謂至斯又經十息之入體則千葉蓮臺處中脈道中之涵字為靈熱力所溶化而菩提月液乃滴降而下周潤腦頂之各各靈脈穴如是又經十息周潤喉輪之各各靈脈穴又經十息周潤心輪之各各靈脈穴又經十息周潤臍輪之各各靈脈穴又經十息全身上下無不周潤即手指足趾之尖端亦皆貫到而無餘此靈熱乳露妙法總共須作百零八息修習者所應知也初修習者一晝夜間須六次如是為之嗣後可減四次但同時其住息所占之時間即亦已隨之而漸經加長每日除眠食等外餘時皆須常作如是修習而無間此為調攝身心靈力之主要功夫亦名靈熱發生之主功為瑜伽者之最要修習也第二段靈熱之經驗靈熱之經驗有普通及特勝之兩種初普通之靈熱經驗者如教所云由持靈力於靈穴初則熱法得發生次則經驗於安樂後則心得自在境如是妄念自休止烟霧幻城陽焰等乃呈如初發曙光無雲晴空次第現釋上偈曰令出息展緩使靈力與心識不散亂者是為持法依於持法風息之往來次數減少者是為動持減少出息之時間者是為時持出息之力減少者是為力持明了息之色用者是為色持明了入息之諸大體德用者是為大持如是既得靈力之諸持則靈熱之波流自得平定穩固又心及靈力如各各得其本來平等境者則靈熱力亦自得源源而發生復次當靈熱初熾時所有各靈脈穴一時開張由靈力載運菩提月液滴入種子於其中遂有如媾精之微痛覺生起斯時生死六趣之境相有現前者是為靈熱經驗之初期或曰初轉種經驗期或曰痛經驗期或曰暖經驗期此後靈脈穴即當一度萎縮旋又開張同時靈力載運滴入之菩提月液量亦增多滿灌其中使之成熟如是不久即當生起極安樂之境界是為靈熱經驗第二期或曰安樂生起經驗期此後不久心為內安樂之所澄定於是舉觀外界一切諸法無不安樂是乃為安樂之正經驗期於是妄想波流自然寂靜而心得其本自在境即正安住或三摩地之境界是為靈熱經驗之第三期或曰無差別境即修習者成功於第十三步之境界然而此之安住境界並非一無覺受之境界其時當有如烟霧如幻城如陽焰如曙光如燈光如黎明如晴空乃至無數莫可備述之種種現相每每現於行者前當此菩提月液三轉之期內然所現見之一切景相或瑞兆行者不可漠然視之但又不得於所未現見者妄欲求其現見要當一向精勤修習於如上所述靈熱發生之主功至若行者之靈熱作用已生效能時則行者自能免除疾病衰老及他種種生理上喪損之作因且能不久證得有漏之五通等世間諸勝果二特勝之靈熱經驗者如訣云於三大靈力脈道會合之處更有靈力入體之第二妙用及云且當得現證於特勝之五相與八德釋曰上述諸普通靈熱經驗中其靈力之得入於中脈端賴行人用其自體活力方法以取得之不外於瑜伽者之自力法乃令外體之靈力活素與內體靈力活素以瑜伽法使之結合成為一如管形體之靈力活素聚因以生起諸妙用者也於此當知更有其第二微妙功用者謂由臍下命門處三大靈脈會合之所靈力入於中脈道已即貫通靈脈中樞之四輪成為靈熱之智體此智體能滲透所有一切精竅之脈穴而開解其中之結繫此諸結繫得開解放於是有特勝之五相一一現前五相者一如火爆發之光明二如月光三如日光四如土曜之光連菩提按土星之周圍附有極強大之星聚光圈此今日天文家已有推論然此土星距日球既有不可算定之程隔吾人今但習近於此一太陽系固尚未能領略於彼土曜之光量究竟較此太陽之光若何耳五如閃電之光其如火爆發之光焰為黃色月之光焰為白色日之光焰為紅色土曜之光焰為藍色閃電之光焰為淡紅色此種種之光焰組成圓虹光圈圍繞行者之身復次行者又必有其已得證於八勝德之經驗八勝德者一由於地大之勝德行者當得有如無愛子梵名那囉衍那之神力二由於水大之勝德行者柔軟光滑入火不焚三由於火大之勝德行者有鎔解消散一切物質之能而入水不溺四由於風大之勝德行者當得足捷身輕落地如棉五由於空大之勝德行者當得飛行自在空際無礙地水皆不能阻六由於月之勝德行者舉身透明而無影七由於日之勝德行者粗色體質皆已淨化舉身轉為各色光焰而能不為人所見八由於已獲得上述瑜伽成就諸勝功德能則身之九竅門閉語之四竅門喉舌唇腭閉而心之兩竅門開謂障於正意正念之結繫得開解也於是於內則得證於無上安樂境外則見聞覺知一切時處之經驗無一而非正三摩地之相續流所謂勝安止境者即此是矣此即完全安止境亦即瑜伽者身語意三輪之最勝調伏境蓋是時為左右脈道日月兩勝靈力調整者之土曜靈力已生妙用貫滿於中靈力脈道中其由靈燃發生所得之勝果境界於是得為行者一一圓滿證驗之靈熱之超勝者如教云無生妙心俱生者無漏三摩地勝住釋曰五蘊之靈表佛性之陽極顯於左方靈脈五大之靈力表佛性之陰極顯於右方靈脈當入體靈力中所含佛性之兩極循左右兩靈脈道降入而會合轉入中樞靈脈道之時即得俱生之淨智靈力此即無上覺智之靈明本體具有無盡之無漏大安樂又於臍輪中有業之靈力能令業因與業果持平心輪中有業之靈力能使業果成熟喉輪中有業之靈力能令業行增盛頂輪中有業之靈力則能令一切業之因行果盡歸寂靜此之業者謂善淨業又當菩提心月液下降令靈熱上溯貫通四輪時使彼彼業之靈力等一時依次活躍直至到頂時頂際靈力脈中乃生起無比之震動而菩提心月液愈益增盛此所以聖者於頂際必有其肉髻隆起者也此能生肉髻之頂輪靈熱脈穴得有由靈熱力增盛之菩提心月液充滿時即是已證得大手印俱生淨智之大安樂而獲得大金剛法界之體性矣方其如是體證之時又有由極下端生死根原密處此即命門發出之白色甘露液盈溢至頂灌溉周遍已如是即於頂輪變成紅色之甘露液傾降而下周潤及於全身直達手指足趾之尖端而無餘如是靈熱成就之根本修習至此方達至極超勝之境界第三節實驗修習實驗修習者分二一獲證熱益之修習二獲證樂益之修習第一段獲證熱益之修習獲證熱益之修習復分三謂練身練息及練觀初練身者交兩小腿作蹲踞之坐右小腿在外兩足跟墊置兩大腿之下兩足之趾適壓於兩膝之下又於膝內灣隙中插入兩手以兜攀抓住大腿如手臂過長可交叉之即左手抓右腿右手抓左腿如不過長不必交叉穩適坐已乃扭動胸腹先由右而左次由左而右各作三遍繼用力鼓動胸腹前壁攪動內部復用力抖動全身如烈馬振毛隨即依於兩膝著地及兩手抓住膝灣大腿之勢將身用力提舉離地至儘量能至之高後乃用力向下猛然拋跌而頓坐於禪座上此以愈能高舉離地及愈能猛力拋跌頓坐者則愈有效以上各三作後復於最後再加一極著力之高舉拋坐如是為一課總作三課次練息者即前文所詳述用力將吸息逼入肺部最下端已乃更收窄膈膜愈緊逼胸腔令如盛水不漏之壺式等法後練觀者觀想自身為內體空明之金剛瑜祇尼母體內左右中三大靈脉及臍下四指之半阿字等如上述者一一專念觀想務極了了分明後乃觀想兩手兩足之掌心各有一日令此四日兩兩對合即兩手兩足各合掌又觀想臍下命門處亦有一日正當三脈合孔處如是以手足心各對相搓觀有熱極之火爆生此火生已即觸發命門處日輪之火彼火亦即爆生延燒半阿字半阿字遂亦發爆生之火延及全身無處不熾然而有靈熱之火勃然怒生如是當呼息出體時觀想此靈熱之火噴出充滿空間作此觀想須隨作上述之舉身離地及猛力拋跌而坐之法三七遍又為此修習除手足相搓時外餘即保持如上述蹲踞坐式第二段獲證樂益之修習獲證樂益之修習復分三一觀於意變勝慧女身二菩提液之鎔降三祕密之體功初觀於意變勝慧女身者於自面前宛然觀想有極盡美妙之女體具足牽起欲樂之美妙此觀想法特為助發欲樂使表陽極之菩提心月液居於頂輪中涵字體者得以鎔解流降蓮菩提謹按此屬欲樂定之極祕密法大乘要道密集述載詳明讀者可參考彼書然此法非於陽極聖覺陰極勝慧之悲智合體真空觀修非具有根基者不可妄為故本書原文此段及遺譯相傳者之此下注語皆甚簡單微旨乃在欲詳知者必由師授依例密乘上師要必極審慎於其弟子之心性德能者方為傳授若此身最大危險性之極祕法亦恐其誤反戕生耳此可淺譬如道家所謂丹鉛豈是服食之陋坎男離女又豈採補之邪然而今誤於彼者亦極愚而堪憫之甚故鄙見此欲樂定之大法非其根器切莫妄為此菩提液之鎔降者須行者先於靈熱六體功法呼吸四種合法及種種發生靈熱觀想法等六體功法見下文此外諸法均見於上述根本修習法中均已修習慣熟後乃可為此此時行者觀想自身變作藍色之火集輪梵名桑巴囉洽格囉藏名柯爾羅董巴藍色者表如一大晴空之真實不變無上大自在空無德不集故名大集金剛通體空明如藍色極薄絹所張之篷幕通明透亮中有三道大靈脈及四靈脈輪乃至半阿字涵字等一一均如前文所述者靈力觸動半阿字發生火焰上升至頂輪中鎔化涵字降滴月露落於半阿字上又當涵字一經鎔化即猛然一聲爆炸其半阿字之火焰即復速速退降至於臍輪中是時涵字更增其鎔化菩提月露沛然下澍令彼火焰愈益熾然復上升延燒於心喉頂各靈脈輪最後涵字全部鎔化降落於喉輪此時即有大喜樂生此為四喜之初喜與二三喜等均尚屬於有漏之世間成就惟得第四俱生淨聖喜樂方為無漏之出世間成就同時當有剎那即轉變之種種境相現前此諸境相猶之遭沒頂而被救活之人悲喜交集自述其沉氣遭溺時之覺受諸境相瑜伽者修行至本段之大喜樂生時其本身已往之種種悲歡苦樂等等對待之境相現在其目心之前然當了悟一切法皆幻及色空不二之無二真空性行者即得安住於一切法平等之真空境隨後涵字之菩提月液降滴下降達於心輪時當進而有上喜樂生起即應證於一切善淨業之正意念及正知見而得安住於無邊際之空境隨後菩提月液降滴下降達於臍輪時更進而有妙喜樂生起即獲證於通體靈脈一時振奮豁然而得入住於大自在之空境最後涵字菩提月液降至臍下命門輪中即一時獲證於俱生智之聖喜樂斯時極微細分之時間法性亦皆了達而得入住於一切空境惟一清淨光明任何世間法皆不足以動此妙明真空之心境矣此為依於菩提月液鎔化流降入於四靈脈輪而順序獲證於大上妙及聖俱生四喜樂之微妙實驗修習也後祕密之體功法者謂納喏巴祖上師之祕傳根本體功法分六事二十事及五十事各種行者當修學者也原書至此第一章之靈熱成就即已截止下述之六體功法不見於原書中乃英譯遺傳原書之達瓦喇嘛得於彼之上師布丹國之大修行者諾爾布喇嘛之所傳原名曰由大樂行金剛勝報身之體功法中別出簡述訓練五肢之根本心要達瓦喇嘛本已原為宗傳迦居爾派嫡脈上師之一既發大慈利衆之心並將此大事體功一法亦加入譯傳於此然有囑示修學之者必當首知皈敬於歷代上師納喏巴祖上師祕傳根本六事體功法納謨嘛哈穆雅禮皈敬大手印一兩拳安膝上兩足跏趺而坐齊腰際扭轉身體由右而左由左而右各三作此功能使臍部諸患消除且能開解臍輪靈脈中之結繫結繫開解已身中乃得健康之作用也二次則扭轉及俯仰以活動頭項此功能使頂喉際之結繫得開解三開掌覆於膝上坐式仍如前由右而左由左而右扭動上節身軀則身之上部疾患得以消除而其各脈道之結繫得以開解四伸縮四肢手連膀臂及腿連足各為一肢以消除其疾患而開解其脈道之結繫先以兩手及膀臂為之原書此語太略亦緣密法之書往往但示名目詳解待師口授幸達瓦喇嘛慈悲已將此解口授於此法要之纂集者並許其筆之於書如下曰所謂伸縮四肢者先以兩手云云者法先以左手開掌並指將右膀臂平直向前伸出亦開掌並指向下俯放平而以左手由肩而下用力擦摸之至右手指尖𢌞轉由右掌心用力擦摸至臂至膀末乃以擊拍式用力拍止於右脅窩處此作三遍已同樣將左膀臂平直前伸俯掌並指而以右手如上用力擦摸及用力拍入左脅窩亦作三遍於是如上所述儘力提舉其身離地至儘力能至之高後乃用力向下拋跌頓坐此乃以左右手擦摸兩腿足亦各三作後亦作一舉身拋跌而坐之結式此即伸法也縮法者但以兩手揑拳曲臂緊靠兩乳際而以兩膀夾拍兩肋骨用力拍擊如鳥夾拍翼膀如是每一夾拍間以舉身跌坐式共三作此即縮肢之法餘者下文原書已詳明後乃兩手開掌平放於身後地上或坐墊以撑支其身用臀部坐穩乃將兩腿足互換向前上空中用力伸踢直出而抖動之五提舉身體此時歸入上文所已述之交小腿蹲踞坐離地高起用力向下拋跌而坐則全身之脈道所有結繫皆得開解然此須同時於舉體高起之際向左右扭動且用力抖振其身體此時以兩手展掌覆壓兩膝以穩定其著地之小腿及足六身向前俯曲以兩手撑支於地或坐墊用力抖振其體且力作鳴聲以呼出陳息乃起而以手周身擦摸之如是所有全身中之脈道皆得恬靜而各安於其部位矣第二章幻觀成就法幻觀成就法分三一認證不清淨之幻色身為嘛雅二認證清淨之幻色身亦為嘛雅三認證一切法皆為嘛雅嘛雅即幻變也第一節認證不清淨之幻色身為嘛雅初認證不清淨之幻色身為嘛雅者如教云依於業成熟幻色身得生行者於自面前於適宜處以架座大鏡一面自照其身而細心觀察之謂於此中之幻我相想有某種榮耀美譽諂諛等法一時加於其身心生喜樂現於顏面之狀繼又反之想有其某種所有物被人剝奪或受人之譏毀不善名稱等心生不喜樂現於顏面之狀觀時設想鏡及己身之間宛然懸空而有若是之人者如上以種種順遂其情意之事加於其身則其面容改變不一而足行者但如是細心觀察之此觀察法為令行者自能窺盼其幻色身所依止之我及我所諸執蓋鏡中觀己即同他人觀我我觀他人觀其一遇順遂之事加於身生於心即有種種之相狀現於面者正亦猶之世愚及猢猻也行者深刻修作此觀其結果自能明了於我我所執之非而解達於凡一切我慢貢高之愚癡實為修學於聖道之障礙次則觀此鏡中幻相與我之幻身原為一體無二無別且以十六比喻法以自忖思而觀之十六比喻法者即所謂如幻城如白雲如水中月如幻術如夢中身如鏡中相等如是精勤慣習此觀法已即能認證此身原為幻化之身所謂嘛雅並非實在者也第二節認證清淨幻色身亦為嘛雅認證清淨幻色身亦為嘛雅者有二一為觀想所成之清淨幻色身二為圓滿現出之清淨幻色身初觀想所成之清淨幻色身者如偈云應如鏡中所現者金剛薩埵妙肖像感應道交攝受際於無垢鏡面上現法以塑鑄或繪畫金剛薩埵或他種本尊之妙肖聖像於適宜位置令其照射而反映於面前之淨鏡中專注視覺及心念以觀之久即能見其像活潑如生在鏡與己身之中間懸空宛然而住繼則觀想自己之身與此聖像一一正同無二無別此自身等同聖尊之觀法功候成熟已繼復舉任何他人之身亦觀之等同所觀修之聖尊無二無別此之功候各成熟已後又進行觀修舉凡一切現見於眼者能一觀想而即能令其等同聖尊無二無別此之功候又成熟已則所有一切情器世間之各體現見者行者能觀其無一而非本聖諸尊之游戲神通所變現此即成就本聖諸尊之實相如如觀或如幻觀或曰轉一切現見成父佛或母佛觀也次圓滿現出之清淨幻色身者如教云是為一切智根本能證入者涅槃近行者修習於毗盧遮那佛七式之坐儀能得了知於一切身心靈命之真實妙諦謂勿追念於過去勿預念於未來更勿寄念於現在惟以一心不亂專注觀於當前無盡之天空於是心念之力得隨靈力活素安住於中樞靈脈而一切雜亂心想得寂靜境即得於此境中出生如前文所述如烟霧等現相乃至五勝現相其時尤有最勝者即於彼無雲晴空之中忽然而現出至極圓滿相好光明之佛相正同水中映現清淨月輪或如鏡中現出勝相此佛像為淨妙應化身者則三十二相八十形好且了了分明惟如增勝為其無上報身者則光焰驟盛未堪細覩分明而行人猶能領聞至極勝妙之音聲耳聖提婆菩薩即繼龍樹菩薩而著三論之百論者偈曰諸相如夢如幻變諸佛徒等皆能言不學感應道交者夢幻實相不得見第三節認證一切法皆為嘛雅認證一切法皆為嘛雅者如教云三界一切動靜法認證無二無異體行者如能慣巧於三摩地之安止境者當於其已具之了知上更加真空實相之認證謂當如實觀察所有一切法如生死涅槃等初似有其兩邊對待者究其實際當體元空故當兩邊無著融為一道真空無二無異凡所有顯表之一切義諦尅實言之終不外正三摩地所勘破之幻法而已能善了知於此實相注念不移持定不失方可進而圓證於彼究竟真際之淨光明境第三章夢觀成就法夢觀成就法分四明悉夢境轉變夢境認識夢境為嘛雅習觀夢境之實相第一節明悉夢境法明悉夢境之修習法有三依心願力依風息力依觀想力一依心願力之修習者此亦云初步之明悉夢境法謂依修習使能了別之識得恆常相續而無斷即於日間一切緣務不失覺念於一切法皆為夢幻又當堅具心願必欲明悉夢境真相於是入夜當眠寢時更復誠懇祈禱上師且必堅具定當了知之心願如是緣是心願之力自當於其所夢之境明悉無遺如偈教有云諸因緣得果皆由心所成二依風息力之修習者謂右側體眠如獅子臥以右手之名指大指抵壓喉部顫動脈管而以左手指遮掩鼻孔合口貯液如是眠睡者於其所夢境相當得同於醒時一一經歷分明而無散失如是修習慣熱已即得所有夢中醒中一切幻法現相歷歷明悉而無遣矣三依觀想力之修習者此復分三其一初謂觀想本義此即觀想自身成就前述之金剛佛母體於其靈脈之喉輪中有紅色阿字放射光明此為金剛報身之真體注喉輪至喉管間有穴管狀長三寸餘當靈力活素靜止其中之時熟睡無夢若於其中動蕩之時則夢境生緣於此紅阿字光照射法界於是世間幻法得以現見但當知其惟是幻現元無實體此則同於光明入境映現諸相而鏡中幻相本非實有行者如是作觀成熟已自得於所夢境明悉照了也其二次觀想之效益此謂夜間眠時如上作觀晨朝醒起即作前述之壺式息七反又堅誠祈願十一反欲求明悉所夢各境復於眉間骨際專念觀想白色明點此眉間明點觀能成就慧目若為血分過盛之人當改觀此明點作紅色若為神經過敏之人則改觀此明點作緑色惟如依此法而仍未明悉其夢境者則當改於眠時增作此明點觀法外於晨朝醒起時修壺式息二十一反堅誠祈願亦作二十一反又復於密處根部觀想如丹丸之黑色明點則所有夢境當得明悉而無餘矣注大凡密乘行者未克成就於某色相之明點觀者必其神經系統有何阻礙或空行衆等發生留難則其上師能審察知之而隨其機宜改示以他種色相之明點觀法其三三防夢散失者此復分四一者人於夢中方欲明悉其夢之境相乃忽然醒起散失其夢對治之法為多服食滋益於體之飲食及多運動身體使其睡夢得安久深入二者人因疲勞過甚則所夢繁雜且多重復對治之法則為於其所夢常觀想之且堅具欲求明悉之心願更加以壺式息及明點觀之合作法三者人於身心感受劇烈憂苦恐怖者所夢之境往往極多醒後又復散失一無所憶對治之法則為避免一切穢惡堪刺激之境事再加復受三摩地之大灌頂及於密處中央作明點觀四者偏於沉寂消極過甚者則無其夢境對治之法於修壺式息時同時於密處中央作明點觀且須特依儀軌精誠修作於喜悅護法空行等衆謂如毗囉及扎格尼衆等諸供養法第二節轉變夢境法轉變夢境者譬如夢中見火當自思惟斯夢中火有何足畏如是堅定自信猛利以足踏蹈火上凡於夢中見任何種似此之境皆猛利以足踏伏之修習於此已純熟時即堪進發心願深信欲樂求得見於諸佛淨樂國土於睡眠時修習於上述喉輪穴內之阿字紅色光明觀想法同時堅誠祈願即令得見於其所欲之淨樂勝境所有彼中依正莊嚴如教所示於心念中一一分明能如是專一其心念以觀修者定當得見於其所欲之淨勝境界如都史內院西方極樂世界東方金剛喜知世界等諸勝境此乃夢觀修習中之一實驗法門也第三節認識夢境為嘛雅認識夢境為嘛雅者如偈教云云何認識夢境幻先當遣除恐怖想夢火轉水以對治夢微物者轉成大夢見大物變成小如是了達形色幻一轉成多多轉一一多等幻亦皆了依此精勤不斷修直至究竟了於幻注此為教瑜伽者對於一切大小一多等諸幻色發展自心靈力使之隨於心念而能轉換蓋即緣於心靈作用之實地驗習能依己之意志力改變幻夢中之境相進一步則為明了幻夢之法原為隨心所變現等同海市蜃樓又進一步則為明了於醒時一切見覺知都是生死夢幻無一實在所謂嘛雅而已其最後之一步則為得大認證豈惟生死夢中無一而非幻相即如所謂十法界中自其最極卑劣上達以至於最極高勝之佛土中其中所有情與無情依正莊嚴亦可等觀之同於此心所變一絶大夢境中之種種容物於是方得印證於根本正智而塵剎相入滴海交融無二無別之涅槃大樂境界一時舉體當前彼無所不具無盡無餘一切智智之真實體性妙明淨心之究竟真相即此是矣行人至是當自觀察我今所有之身無異夢中之幻身其他各各有情之身亦復如是又當善觀彼彼諸身等同本聖諸尊嘛雅所幻化參看前章幻觀成就法第二節如是自得認識所有一切皆是嘛雅矣第四節習觀夢境之實相習觀夢境之實相者即修習於所云諸法一如觀謂即應用於夢中能生諸聖淨相境之薰習使成究竟清淨也行者對夢境中現見聖相專念注觀不作任何他想保持安住於其淨境則此聖淨相境久之自與無相之心調融無間合為一體而真實際清淨光明同時曙發修習於此已成熟者則可任於醒中夢中所有一切境相悉皆洞達其幻且明悉其皆由彼一大清淨光明藏中之所出生至是乃得了了於色心諸法究竟一如也第四章淨光成就法成就於淨光者先須知有三種之淨光一根本淨光二道淨光三果淨光第一節根本淨光如偈教云最極上妙教厥為淨光法根本道及果是三應善學所謂此心之真體諸法之實相不二不異之真空當彼已得受用於無上清淨大安樂境時即獲證於超乎一切之法者是即根本淨光也第二節道淨光道淨光之修學有三日中道行融合淨光夜間道行融合淨光中陰現前融合淨光一日中道行融合淨光者此有所謂五要妙教授注五要妙教授者一實相之認識二淨光之等差三淨光之三喻四明滿道行程五明行之果境凡行者於明滿道行程進修中但究其對於淨光等差及三喻已能得有若何之功候則其於真實際修行上已達至於何等程度者即可加以測定注密乘瑜伽上師於攝納弟子時每作測驗其測驗之標準即試探討其對於淨光之三喻功候有何程度而揀擇其於實相認識之切實工夫造境若何淨光三喻者一曰子淨光由勤習於諦洛巴祖上師之六不教授而有證得者二曰母淨光此即證得於前念方滅與後念未生之間者三曰和合淨光此為於上二者已修證得其和合為一之正智淨光明境也此於下文當廣詳道行之首要為何謂修合上師之瑜伽為極首要道行之總相為何謂當如甫從母體出生嬰兒之喻道行之境界為何則曰光曰燃曰持三者是也注彼母淨光或根本淨光者行人所當首先求證得此母淨光子淨光乃能出生故有母體生嬰之喻又彼三境界者證得母淨光則謂之曰光由此母光顯發出生炳然照燭是之謂燃由於燃照德能則得長久安住於靈明之境是之謂持蓮菩提謹按密法首重師承如宗喀巴大師之菩提道次第極略頌之第一頌曰諸功德本恩上師如理依止道之根於善見已多精勤恭敬依止求加持是故此中有修合上師之瑜伽為極首要一言也淨光之曙發要必伏於前念已滅後念未來之際而道行中能得生起淨光妙用要必修習於諦洛巴聖者大師之六不要妙教授其偈曰不思不念不尋究不觀不想持本元讀者於此須參讀涅槃道大手印瑜伽法要彼中有此半頌之異譯於此修習成熱自得證驗淨光境界當彼之時無二無異非有非空之唯一實相光明豁然現前者即其子淨光之已得出生也彼原無垢染本元真心之清淨光明先已曙發於其前念已滅後念未來之際者則其根本母淨光也而其靈靈明明至斯一切皆能認證者則為其子母淨光融合為一體之光明如是所謂淨光融合於道行者即此是矣二夜間道行融合淨光者如偈教云觀自心輪中有四葉蓮華四葉及蕊臺齊皆舒展放上有五真言阿努打囉吽又偈教云於五蘊大及諸界集中兩時能知力兩時者醒時夢時也成就空性入睡眠及風息力得夢定人甫入睡即得安止者則彼境界譬如海面平靜風波不興然其間亦有光燃持之三種境界注此所云光者謂彼空明大樂現前之境所云燃者謂此樂境持續及與明悟而其所云持者則謂諸境相依次顯發而不失與前段同名之三境不同蓮菩提謹按下文但引申上述兩頌中之第一頌意而其第二頌意雖無引申然讀者取此段再與前夢觀成就一章之法同研究之其意自明也又淨光之認證於此時者要必在於醒境方終睡境初至之中間時際而其能得顯發彼淨光妙用者則須以禪定法門之要妙教授於睡眠境善巧施之此謂先須修作祈禱於諸上師求其加被令能究竟認證淨光嗣當猛利堅願必行認證等蓮菩提謹按於此當可加作如夢觀成就法中之風息等法原書未詳殆為略文故謹加入一等字即於自身觀成本尊怙者於自心內觀一四葉蓮華中心蕊臺上真言吽字面前葉瓣上真言阿字如是右努後打左囉於各蓮瓣依次安立了了分明蓮菩提謹按此阿努打囉四字者即舊譯阿耨多羅三藐三菩提一言之前四梵文字也學藏密者多用由梵文胎化之藏文字體以作觀想本書中所應用之藏文曾學藏密者皆可知之於是睡態朦朧境將欲來前之際即觀彼所有一切見聞諸法皆融化沒入自身中自身舉體亦漸融化入沒於彼心蓮真言字輪次於睡意漸濃時再觀所有一切之法皆融化入沒於此真言字輪前面之一阿字內由彼又皆融化入沒於右方之努字如是由努入打由打入囉乃至由囉入沒於中央之吽字繼復觀此吽字下端之長音母音兩符號亦漸融化入其中段之哈根字中次則哈字融入其頸部半仰月之符號中次由半月融入首端之圈體次此圈體漸亦融化入沒於其最極尖頂如火焰尖處最後此最極微細之焰尖亦完全融化入於大自在空際如是觀空已而入睡境者即能成其安然而入之睡眠淨光定境此即所謂返觀禪定法也或不如上遂字觀想融化之法惟於彼五真言全輪組集中心念觀其融空亦可此則名為全輪融空觀也如上觀修者即可於醒境睡境中間之時際證得根本母淨光即為光境由是得其安穩之睡境即為燃境及其已得深入於睡眠定者即為持境也又其甫行入睡而得現前之淨光此即其母淨光一時專注心無他念但依止上法觀得者即其子淨光如是既得母淨又得子淨光終至如同舊識重逢一見即行認證之者則是母子淨光融合無間之境也三中陰現前融合淨光者此於下文第五章中陰成就法中廣說之矣第三節果淨光第三果淨光者如教示云尊聖淨幻體淨光具圓明由淨光出現如魚乍躍水金剛大持體由眠警覺生此皆表融合母子兩淨光若此最勝果緣於勤修習修習之根本即能所教授謹按能教授者即根本上師所教授者即所傳承之法也證入如是果地者即為已登第十二地金剛大樂地此地果德如下偈示云幻色無色合明覺現於前了達纏幻苦及解脫真樂淨光真心顯純熟轉變通此瑜伽明行無上八成就如是之境地者即是金剛大持或多傑羌佛明行足之佛地至斯已具更無所教授之智道之究竟已達自無能教所教故又如偈云圓具一切金剛力身語意及諸悉地動靜顯變俱無礙莊嚴福德一切成如是無上八最勝即瑜伽道圓滿果第五章中陰成就法成就於中陰者分三種證入證入淨光境之清淨法性身證入淨報身證入勝化身第一節證入淨光境之清淨法性身於中陰境內證入淨光之清淨法性身者如偈示云光消滅及色消滅想消滅及識消滅識消滅已又識生此際淨光即開曙光曙兩體當合一有其已教與未教此云兩體合一者即母子兩淨光合一也融其已教入未教此名成就得證果死亡之法緊接於中陰境以前中陰境臨前時景象如秋日無雲之晴空其間亦有光燃與持三種之界分認證淨光者要必在於生世知見方息死後知見未生中間之時際於此道中顯發淨光妙用者要須善巧運用於其所受之上妙教授使其道行能與真心之境和合為一是為極要方死時境之要妙當彼前五識並眼識界內返退失之際凡一切具顯形幻色之對象皆內返散降退滅即所謂光消滅此光指世間光也此時即覺地大降於水大謂此肉體消失其繫著性次則水大降於火大謂如口鼻乾枯次則火大降於風大謂體溫消失次則風大降於識大或空大是時具諸惡業者即受其痛苦具諸善淨者有其聖衆上師及扎格尼等來相接引於最後之一呼息終了已則此色身內返退喪於是於其內駐體中靈力活素猶尚持存之前半時際即其氣息已停但其識神尚未出體之際當生起能認知之各覺境其所覺在於外者有似乎月之光明在於內者如煙霧之狀此時即為方死時光明現前之境是謂光境此之景象旋復轉為燃境此即死者經驗於其方死境象時其瞋恚三十二性妄當令遣除如是外所覺者則有其如日光之照覺在內者有如流螢之光此則正是燃境之時此之燃境時不久即當轉入持境謂彼之貪欲四十性妄又當遣除則其所覺於外者當有如月蝕日時日中所現黑月光影而其內所覺者則如油燈外蒙半透明之罩此為方死者所經驗之持境由此持境再轉即入淨光明境謂彼無明之七性妄者當令其根本遣除此際幻識皆已消滅而後外所覺者有如黎明欲曙之光內所覺者則為一片無雲秋日之晴空此第四境即淨光境矣已上所述之中陰前行境與死亡法之諸境銜接而生彼修習有成就者稱之曰初期中陰或曰起海中陰謂此尚是死後中陰諸境發軔之期也蓮菩提謹按此中所云貪瞋癡諸性妄法數原書未注出大乘要道密集中不惟述之於小注中且其瞋性妄三十三較此尚多一數今謹録該書此段法數於下至其中亦多善法之名列成性妄者則以其從於毒性善亦能毒其理可知也八十性妄者從瞋有三十三一下離貪二中離貪三上離貪四來五下煩惱六中煩惱七上煩惱八寂九尋十下怖十一中怖十二大怖十三下愛十四中愛十五上愛十六取十七不喜十八飢十九渴二十下受二十一中受二十二上受二十三明了二十四明執二十五分別二十六不知慚二十七無悲二十八下慈二十九中慈三十上慈三十一老三十二收三十三妬從貪有四十一貪二遍貪三下喜四中喜五上喜六踴躍七勝變八希有九掉舉十憎十一相抱十二作吻十三咂十四固十五勤十六憍十七作十八求十九勢二十樂二十一下合喜二十二中合喜二十三上合喜二十四緊二十五譽二十六不睦二十七欲二十八句顯二十九真實三十不真實三十一決定三十二不取三十三布施三十四警策三十五勇健三十六無愧三十七慎三十八惡三十九劣性四十欺誑從癡有七一中貪二失忿三迷亂四不語五懨嫌六懈怠七疑悔臨終瑜伽之要妙當臨終時其瑜伽之要妙如下臨終時應行捨割於所有一切牽緣於此世間及其所有於此世間者或其宿現任何冤對存亡人等之情於上述死滅退降之法進行中極善安止其心排除任何思念如是則凡所當經驗於諸境受一經來前即得各各自在安然合入安止之境於此即能得其子淨光之現前由是繼復得其第四淨光境之母淨光朗然現前此所以母淨光又復現於子淨光之後者蓋實際生子以後其母方成立也而一念靈明朗照了了於此兩淨光之體性有如舊交重逢因生死死生本曾久經不知多少次是即母子淨光融合為一之謂也安住於此淨光明境隨樂久暫如是善巧於彼三步反觀瑜伽要妙修持已純熟者即能運靈識由頂門梵穴而出此即下章之轉識成就法直行超登圓滿覺道之佛地即令修持稍遜亦可成就第十地菩薩持金剛之位注此中所云三步返觀瑜伽要妙者為極匪易之瑜伽法其大略如下謂如上所述緊接捨命以前之頃有白如月紅如日及其黑昏之三種光現前瑜伽者即依此之相反次第遣除一切妄念觀想於彼黑昏紅光及白光同時又以相返之次第溯想死後三境此謂一第四次現前之母淨光二幻識之消亡三色身之消亡且同此三者返溯觀想時尤應作意自問究三事曰我今在何所我究為何物我今歷境究為何者善巧純習於此已其下即行修作於下章所述之頗哇轉識法若於彼頗哇轉識之法已會修習嫻熟者則其識神自能由其中脈上端之頂門梵穴脫然而去而不由常人之九竅如是者即成就其佛地也第二節證入淨報身中陰成就之次者為證入淨報身如偈教曰顯然以生出具幻色之身識處皆具有且行動無礙及與業所依變化幻現力未能認證淨光之業力果由於未能認證清淨光明根於無明而來之七種性妄於是生起而有其業果光現前者則當經驗於大空境注此業果光者甚劣於淨果光以其未得覺悟已自障其淨光有如雲遮故稱為業果光謹按此業果光境即當前述三境界中之持境因下文言燃境無境故次則根於貪欲而來之四十種性妄繼之生起於是燃境現前而經驗於其最極空境次則根於瞋恚而來之三十三種性妄繼又生起於是所謂光境者現前而經驗於其自性空境惟以其未得覺悟故妄自奮起輪𢌞道之靈力活素致令其識神由九竅之一而出體徒以此故始自形成其中陰之身中陰身之概況中陰身者意生身也具諸識處其報色則依於其所應投之趣而異其行動自由毫無止礙惟一時尚未能隨樂而入母胎其來往一大千世界隨其意想亦即可能中陰界中彼此之因道果及所當投之趣別同者即可彼此相見謂如同屬應入天道之中陰有情即彼此相見於天趣餘趣亦然此界有情惟以香嗅為食界中日月不見故無晝夜之分長居一種似明似暗如將破曉或黃昏入夜之景況初時其識神經過一度昏迷時期約人世三日又半之久吾人居母胎十月之間亦是昏迷期過此醒覺而知其已死則極悲憂苦惱當此之際彼已能知中陰界之真相然在普通之人往往於彼昏迷相即已受生於相當業感之趣中更不復能如是醒覺認證中陰境及取受中陰身但一經認證中陰境界隨即而有種種之猛利倒妄生於其心故此際亦謂之曰此正是時之際謂當此之際最要者應歷歷憶念於其已曾受學於生時之中陰教訓作其匡正蓮菩提謹按達瓦喇嘛另行譯傳有中陰救度密法一書詳述中陰各期境象以及如何導示死者靈識自拔之法此書亦經鄙譯讀者須參習之中陰界內之證悟捨報命終者要當使其能了知已死及認知中陰之靈識持續而不斷如偈教云命終入中陰方將受有身應證彼如幻聖悲智合體圓滿證悟者即得淨報身一經了知於自既已捨報命終即想自身成就本聖尊體猛利修作如上文即淨光成就法中夜間道行融合淨光法之返觀禪定及五真言即阿努打囉吽五字觀空等法置自身於淨光境中於是更依修持於逆溯三光境即上節注中所述之三步返觀瑜伽之力結果所至當得金剛大持尊悲空不二之聖淨境相現前而證獲如彼之圓滿淨妙報身佛地也第三節證入勝化身法中陰成就第三即如何證入勝化身法趣求復生之中陰境謂若於中陰第二期藏名踵倚中陰未得證入聖道者即當經受於彼四種所謂大恐怖之聲音此為由於地大之生死力出生如山倒之巨聲由於水大之生死力出生如海嘯之巨聲由於火大之生死力出生如林燒之巨聲由於風大之生死力出生如千雷齊鳴之巨聲不勝其響而狂行逃逸之處則輪𢌞也且其狂逃時又忽臨三處最極險惡可怕之峭絶岩壁一白色一紅色一黑色下望不知其底之深墜此任何一峭壁下即是墜入輪𢌞之內也注墮白色峭壁者生入天趣墮紅色峭壁者生入餓鬼趣墮黑色峭壁者生入地獄趣皆為輪回生死終苦無樂非瑜伽道之行人所宜往投者又此三色峭壁在中陰救度密法書中以其即表瞋恚貪欲愚癡之三毒障積染為輪回生死之因也又當現出五條有光亮之徑道已善學習教授者一見即當了別如誤循其任一徑道而行即是又被導入茫茫生死輪𢌞也注此中白色光徑導入天道如烟霧光徑導入地獄道黃色光徑導入人道紅色光徑導入餓鬼道緑色光徑導入阿修羅道又所云已善學習教授等者謂瑜伽行人一見此各色徑道即當明了而不可誤入彼茫茫輪回生死之徑道也此外更有他種現相亦當生起謂如至極強烈發光之巨球體間夾於無數無量之火焰噴發四射中或於身後有極可怖畏之狂風暴雨相緊逼追逐而來或忽出現極形忿怒之男女怪身來相攫捉或忽值遇於彼依憑業行鏡牌頓施慘刑之極可怖畏囉咋司命鬼王衆等乃至或被囚入鐵圍之地獄內等等怖畏無窮之境於是彼狂奔逃逸於樹穴中地洞中等處者或即墮生餓鬼或畜生道中矣若其墮入一湖中水面有雁類游行者即生東勝神洲若墮一湖岸際有牛方嚙草而食者即生西牛賀洲若墮一湖岸際有馬嚙草食者即生北俱盧洲若見大廈中有父母方行房事者即生南瞻部洲若見天宮輝煌壯麗而入其中者則得生天趣矣根於業染積習令人迷妄顛倒至此等境仍極盛強熾然亟欲求生故此時期即名曰食香者即中陰之有情求生期揀擇生門之瑜伽法於揀擇生門瑜伽教授中有切要法如偈教曰貪著與厭惡諸欲悉遣除堅住善淨念離一切妄想一心惟專注揀擇善生門及修習轉識生喜知等土如是瑜伽者得隨樂往生於欲求復生之中陰期中蓮菩提謹按即上段所述之諸境界藏名此期為悉罷中陰種種怖畏之驚奇聲相但當如實了知其一切無非幻妄者則諸不堪投入之生趣門自能閉息復次當善憶念於生時所受學之要妙教授了達其自性空理惟專注觀念於自之生時上師及所修本尊則彼不堪投入之生趣門亦自閉息如是善作意以觀想於己所欲生之處必其尊貴且富資財之人間賢善族中俾得具緣持續於聖教事業則如此之生隨念即得此即獲生於所謂勝化身者也又於瑜伽道已善修習於生時則於命終頃即未能證見淨光亦得隨願取證不退菩薩之位往生十方淨土如西方阿彌陀佛極樂世界東方金剛薩埵喜知世界種種淨樂佛土蓮菩提謹按此段似太略然其意固在於生時修學瑜伽有成者則死後自能隨願往生況即頗哇一法修成時其轉識往生自在均在握也讀下章及頗哇心要轉識自在法中所述自明也第六章轉識成就法轉識成就法者藏文名曰頗哇有三等成就之分上等者轉識成法性身中等者轉識成淨報身下等者轉識成勝化身第一節三等成就身一上等轉識成就法性身者即初期中陰際證入淨光明境二中等轉識成就淨報身者即中期中陰境證入聖空悲合成體三下等轉識成就勝化身者即取獲於勝善轉生身此就身言雖分三等而其教授要妙之修習道則非有三種惟是一法也謹按下文雖但示一修合多傑羌佛之法須知此多傑羌佛者為五方五佛之總體一切智智一切身身但能成就於此即自無不成就矣第二節上師本尊瑜伽轉識法依於作修上師本尊瑜伽之頗哇轉識法者如偈教云先作彼壺式風息三七反著力提識種經脊椎上行於三七靈輪一一輪提升上升復下降相應誦真言此所誦真言有全半兩聲誦真言之聲令著力高響導能知識種趣入淨樂界正是時一至轉識頓成就謹按此正是時者即臨終時也此法有恆修及臨用二者如下分述一恆修恆常所修恆修法者先當堅願誓成佛道次即觀想自身成為金剛瑜祗尼母當體空明於體幹中心觀有中脈猶如支持篷帳之中央大柱惟上大下小下端封口而上端開孔如天窗此天窗孔外上面坐有聖根本上師多傑羌佛其體亦空體之中心亦有智慧中脈此中脈與自之中脈通連為一直管道自心與本尊之心遙遙相望而可通次即觀本尊心中有藍色吽字細如毫毛自之心中亦有同樣之吽字即為自己之識種於是修習壺式之息令身成壺持息已即觀本尊心中吽字下端母音符伸長如鈎垂下於自心中將自心之吽字向上提升於是呼一出息即同時呼出一醯字按此即偈文所云全聲字儘力高聲呼喊之猶如在極恐怖之下呼救者然如是連續二十一呼即經由靈輪一一提升之謂也即想自心吽字已被提升至達頂門天窗之口至是即改嘎聲此即偈文所言之半聲字使此自心吽字循中脈管漸漸下降退於自心原處呼嘎字之聲亦同於呼醯時之高而響亦連續呼二十一次且觀其順彼二十一輪一呼一輪而漸下降如是修習往復上下令極純熟二臨用臨終所用臨用之時即令自心吽字更被上提投入上師本尊心中吽字合而為一於是自身即已舉體投合上師本尊即隨之往生永無退墮及生死之淨樂土中而住入非可言喻之聖境矣原書跋尾云於西藏之古哩郡圓妙山茅蓬緣於遏阿哩之贊喀兒國以王位而修道士名贊判贊波者之所勸請博學比丘珀瑪迦爾波作普願禎祥又跋云此依於聖教所作之六成就法心要為先輩已感應道交於聖本尊而有成就諸祖德所依止修行之至極要妙為欲使此珀瑪迦爾波大喇嘛所慈垂之希世法寶得以流傳由其令姪涅勇班禪校訂由信心財富俱足之藝術家却準多傑施資刻版願此勝施圓善功德回向一切如母有情速速即此一生同證多傑羌位明行道六成就法要全書竟
