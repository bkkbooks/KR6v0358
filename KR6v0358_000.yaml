front:
  text: 明行道六成就法敘佛説一切法為度一切心若無一切心何用一切法誠哉斯言也衆生一念不覺所以萬慮齊彰三毒開四生之門十使引六道之路五塵障成作之智六思蔽妙觀之境致使大圓失光明之元照平等轉憎愛之情想由是輪回七趣無止互轉九有何休往來火宅無安漂流苦海何極如斯痛苦誰能拯拔唯我釋迦世尊慈悲哀愍為此因緣出現於世觀機設教應病與藥用大無畏之戒定慧方便救濟離苦現至威德之法報化權巧善誘得樂教分小大之乘法開顯密之宗普令饒益法界有情隨根莖以證果契因緣而解脫雖然法門無量定慧為本妙行廣大止觀為先而顯密中求其圓成定慧融通止觀堪作阿伽陀者其唯此西藏所傳明行道六成就法乎是法簡而約精而審條理井然次第朗然依法修持必得受用然學者於斯法要加意著眼夫明行道云者究竟本心之法也明者心之相也行者心之用也道者心之體也合言之即體相用三大之妙也體即法身相即般若用即解脫此三德祕藏之身唯一本心所現若能由止觀而成定慧因定慧以明一心本心既明德相圓矣其功要亦在斯六法次第修習成就也且此本源一心佛生同體已悟已證者所以為大覺也自暴自棄者所以為羣迷也果能猛省覺悟透出重圍既説破又跳過即可轉識成智返妄歸真化煩惱為菩提即生死為涅槃二諦融通五行具備方便利生可滿菩提之願善傳心印用續慧燈之熖大矣哉明行道六成就法之妙誠顯密之要寶也此法西藏至祕漢日密部尤未前聞何幸妙定居士得其英文譯傳重譯以成華文發大心願公布流通豈惟普使修習密法者速證本尊之身亦即所以續佛慧命報佛殊恩者矣然其法中觀想幽玄理事淵深應以菩提正念微細熱習大悲心量精進修持攝六根以清三業顯一心而淨七支切忌技節橫生私心妄用或多疑少信一曝十寒匪特佛法不能相應凡諸事業皆難成功至若修習是法由淺而深由深而妙由妙而玄由玄而化豁開金剛正眼覩破未生骷髏即生即佛無欠無餘何妨宣揚教典離文字相化導羣迷離言説相上求下化離心緣相乃至出息不涉衆緣入息不居陰界如是佛法界不可得衆生相不可得夢幻境不可得中陰身更不可得不可得亦不可得於此不可得不可得中正好安身立命自利利他初亦奚用如是之葛藤為哉其或未然者必須安而行之利而行之勉強精進而行之以期放心而已矣用贊一偈曰瑜伽無比明行道六成就法最勝要知見不立真妙諦何必拈花多一笑丙子結夏荊沙章華隱者本一槃談
